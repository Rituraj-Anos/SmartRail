name: SmartRail CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  POETRY_VERSION: "1.8.3"

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & Format Check (Python)
  # ─────────────────────────────────────────
  lint-python:
    name: Lint Python (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install lint dependencies
        run: poetry install --only dev --no-interaction

      - name: Run ruff (linter)
        run: poetry run ruff check core/ optimization/ simulator/ services/ integrations/ tests/

      - name: Run black (format check)
        run: poetry run black --check core/ optimization/ simulator/ services/ integrations/ tests/

  # ─────────────────────────────────────────
  # JOB 2: Lint (Frontend)
  # ─────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend (ESLint + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript type check
        working-directory: frontend
        run: npm run type-check

  # ─────────────────────────────────────────
  # JOB 3: Python Unit Tests
  # ─────────────────────────────────────────
  test-python:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    needs: lint-python

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: smartrail
          POSTGRES_PASSWORD: smartrail_test
          POSTGRES_DB: smartrail_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install all dependencies
        run: poetry install --no-interaction

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql://smartrail:smartrail_test@localhost:5432/smartrail_test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test
        run: |
          poetry run pytest tests/unit/ \
            --cov=core \
            --cov=optimization \
            --cov=simulator \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────
  # JOB 4: Solver Benchmarks
  # ─────────────────────────────────────────
  benchmark:
    name: Solver Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test-python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run benchmarks
        run: |
          poetry run pytest tests/benchmarks/test_performance.py \
            -v --tb=short --timeout=60

  # ─────────────────────────────────────────
  # JOB 5: Docker Build (all services)
  # ─────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-python, lint-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build optimization service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.optimization
          push: false
          tags: smartrail/optimization:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build API service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.api
          push: false
          tags: smartrail/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./infra/docker/Dockerfile.frontend
          push: false
          tags: smartrail/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 6: Integration Smoke Test
  # ─────────────────────────────────────────
  integration-smoke:
    name: Integration Smoke Test (Docker Compose)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack via Docker Compose
        run: |
          docker compose -f infra/docker-compose.yml up -d --build
          echo "Waiting for services to be healthy..."
          sleep 30

      - name: Health check — API service
        run: curl --retry 5 --retry-delay 5 --fail http://localhost:8000/health

      - name: Health check — Optimization service
        run: curl --retry 5 --retry-delay 5 --fail http://localhost:8001/health

      - name: Install Poetry for integration tests
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install test dependencies
        run: poetry install --only dev --no-interaction

      - name: Run integration tests
        run: poetry run pytest tests/integration/ -v --tb=short

      - name: Tear down stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v

  # ─────────────────────────────────────────
  # JOB 7: Push to Registry (main only)
  # ─────────────────────────────────────────
  deploy:
    name: Push Images to Registry
    runs-on: ubuntu-latest
    needs: integration-smoke
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push optimization image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.optimization
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/optimization:latest
            ghcr.io/${{ github.repository }}/optimization:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./infra/docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
